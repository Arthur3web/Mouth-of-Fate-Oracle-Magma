<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a0a00" />
    <title>Жерло Судьбы</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="images/icon-192.svg" />
    <link rel="apple-touch-icon" href="images/icon-192.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <video class="lava-bg" autoplay muted loop playsinline preload="auto">
      <source src="images/lava.mp4" type="video/mp4" />
    </video>

    <!-- ЛЕНДИНГ: выбор роли при первом заходе -->
    <div class="picker">
      <h1>🌋 ЖЕРЛО СУДЬБЫ 🌋</h1>
      <p>Выбери роль для этого устройства</p>
      <div class="picker-buttons">
        <button class="role-btn" data-role="display">
          <span class="role-emoji">🌋</span>
          ЖЕРЛО
          <span class="role-hint">показ предсказаний</span>
        </button>
        <button class="role-btn" data-role="remote">
          <span class="role-emoji">🎛</span>
          ПУЛЬТ
          <span class="role-hint">управление кнопкой</span>
        </button>
      </div>
    </div>

    <!-- ЖЕРЛО -->
    <div class="frame idle visible" id="frame">
      <span id="predictionText">…жерло судьбы спит…</span>
    </div>

    <!-- ПУЛЬТ -->
    <div class="remote-panel">
      <h1>ОРАКУЛ</h1>
      <div class="status" id="status">Нет соединения — Оракул спит</div>
      <button class="big" id="getPredictionBtn" disabled>
        ПОЛУЧИТЬ ПРЕДСКАЗАНИЕ
      </button>
      <div class="counter">
        Доверилось оракулу <span id="totalCount">0</span> человека
      </div>
    </div>

    <!-- Сменить роль (видна в режимах display/remote) -->
    <button class="menu-btn" id="menuBtn">⋯</button>

    <div class="menu" id="menu">
      <button id="switchRoleBtn">сменить роль</button>
      <button id="reloadBtn">перезагрузить</button>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
