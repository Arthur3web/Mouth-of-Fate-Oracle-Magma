<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a0a00" />
    <title>Жерло Судьбы</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="icon-192.svg" />
    <link rel="apple-touch-icon" href="icon-192.svg" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0300;
        color: #f5e9d6;
        font-family: 'Georgia', 'Times New Roman', serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        position: relative;
      }
      .lava-bg {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }

      /* ---------- ЖЕРЛО (показ на планшете) ---------- */
      .frame {
        display: none;
        background: rgba(20, 14, 8, 0.55);
        backdrop-filter: blur(3px) saturate(1.2);
        -webkit-backdrop-filter: blur(3px) saturate(1.2);
        border: 6px solid #000;
        border-radius: 36px;
        padding: 60px 80px;
        max-width: 78vw;
        text-align: center;
        color: #f5e9d6;
        font-size: clamp(1.6rem, 4vw, 3.2rem);
        line-height: 1.45;
        white-space: pre-line;
        box-shadow:
          inset 0 0 80px rgba(0, 0, 0, 0.55),
          0 12px 50px rgba(0, 0, 0, 0.6);
        opacity: 0;
        transform: scale(0.95);
        transition: opacity 0.9s ease, transform 0.9s ease;
      }
      body.mode-display .frame { display: block; }
      .frame.visible { opacity: 1; transform: scale(1); }
      .frame.idle {
        opacity: 0.35;
        font-style: italic;
        font-size: clamp(1rem, 2.2vw, 1.5rem);
      }

      /* ---------- QR-КОД для пары ---------- */
      .qr-corner {
        display: none;
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border: 2px solid #000;
        border-radius: 24px;
        padding: 14px;
        text-align: center;
        color: #ffeecc;
        z-index: 10;
        transition: opacity 0.6s ease;
        opacity: 0.95;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
      }
      body.mode-remote .qr-corner { display: block; }
      .qr-corner.dim {
        opacity: 0;
        pointer-events: none;
      }
      .qr-corner canvas {
        display: block;
        border-radius: 12px;
        background: #ffeecc;
      }
      .qr-corner .qr-label {
        font-size: 0.85rem;
        margin-top: 8px;
        font-family: 'Courier New', monospace;
        opacity: 0.9;
      }
      .qr-corner .qr-room {
        font-size: 0.7rem;
        margin-top: 2px;
        opacity: 0.6;
      }

      /* ---------- ПУЛЬТ (ноутбук) ---------- */
      .remote-panel {
        display: none;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 60px;
        padding: 40px 50px;
        text-align: center;
        color: #ffdd99;
        max-width: 600px;
        box-shadow: 0 0 60px rgba(255, 102, 0, 0.4);
      }
      body.mode-remote .remote-panel { display: block; }
      .remote-panel h1 {
        font-size: 2rem;
        margin: 0 0 24px 0;
        text-shadow: 0 0 12px #ff6600;
        font-family: 'Courier New', monospace;
      }
      button.big {
        font-family: 'Courier New', monospace;
        font-size: 2rem;
        padding: 24px 44px;
        background: #e35f21;
        border: none;
        border-radius: 80px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        margin: 12px 0;
        box-shadow: 0 6px 0 #722f0a;
        transition: transform 0.05s linear, box-shadow 0.05s linear;
      }
      button.big:active {
        transform: translateY(3px);
        box-shadow: 0 3px 0 #722f0a;
      }
      button.big:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .counter {
        font-size: 1rem;
        margin-top: 18px;
        opacity: 0.85;
      }
      .status {
        font-size: 0.95rem;
        margin-top: 14px;
        opacity: 0.85;
      }
      .status.ok { color: #88ffaa; }
      .status.err { color: #ff8888; }
    </style>
  </head>
  <body>
    <video class="lava-bg" autoplay muted loop playsinline preload="auto">
      <source src="lava.mp4" type="video/mp4" />
    </video>

    <!-- ЖЕРЛО -->
    <div class="frame idle visible" id="frame">
      <span id="predictionText">…жерло судьбы спит…</span>
    </div>

    <!-- QR для пульта -->
    <div class="qr-corner" id="qrCorner">
      <canvas id="qrCanvas"></canvas>
      <div class="qr-label">📱 СКАНИРУЙ → ПУЛЬТ</div>
      <div class="qr-room" id="qrRoom"></div>
    </div>

    <!-- ПУЛЬТ -->
    <div class="remote-panel">
      <h1>🌋 ЖЕРЛО СУДЬБЫ 🌋</h1>
      <button class="big" id="getPredictionBtn" disabled>🔮 ПРЕДСКАЗАНИЕ</button>
      <div class="counter">Всего: <span id="totalCount">0</span></div>
      <div class="status" id="status">соединение…</div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <script>
      // ============ РЕЖИМ ============
      const params = new URLSearchParams(location.search);
      if (params.get('reset') === '1') {
        localStorage.removeItem('role');
        localStorage.removeItem('room');
      }

      function sanitizeRoom(s) {
        return (s || '').toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-').slice(0, 40);
      }

      const urlMode = params.get('mode');
      const urlRoom = params.get('room');
      // если попали по QR-ссылке — запоминаем роль и комнату на этом устройстве
      if (urlMode === 'display' || urlMode === 'remote') localStorage.setItem('role', urlMode);
      if (urlRoom) localStorage.setItem('room', sanitizeRoom(urlRoom));
      let role = localStorage.getItem('role') || '';
      let room = localStorage.getItem('room') || '';

      function generateRoom() {
        return 'room-' + Math.random().toString(36).slice(2, 10);
      }

      // первый запуск — устройство по умолчанию становится "Пультом" (хостом с QR);
      // второе устройство сканирует QR и превращается в "Жерло" с предсказаниями.
      if (!role) {
        role = 'remote';
        localStorage.setItem('role', role);
      }
      if (!room) {
        room = generateRoom();
        localStorage.setItem('room', room);
      }
      room = sanitizeRoom(room);
      document.body.className = 'mode-' + role;
      startApp();


      // ============ ПРИЛОЖЕНИЕ ============
      function startApp() {
        // ----- предсказания -----
        const calmPredictions = [
          '🌊 Судьба течёт спокойно — доверься времени.',
          '🌱 Сегодня рост начинается с малого шага.',
          '☀️ Светлый путь уже открыт перед тобой.',
          '🍃 Ветер перемен мягко коснётся твоей жизни.',
          '🕊 Мир внутри тебя станет главным ответом.',
          '🌸 Терпение принесёт неожиданный дар.',
          '💧 Даже капля способна изменить камень.',
          '🌙 Луна хранит для тебя тихую удачу.',
          '🌿 Новое начнётся без лишнего шума.',
          '✨ Судьба благосклонна к спокойным сердцам.',
          'Ветер переменится.\nПока не время.',
        ];
        const activePredictions = [
          '🔥 Судьба советует рискнуть.',
          '⚡ Действуй сейчас — момент силы пришёл.',
          '🌋 Твоя энергия способна изменить ход событий.',
          '🌀 Решение близко, не бойся перемен.',
          '💥 Из искры родится великое.',
          '🚪 Откроется дверь, которую ты не замечал.',
          '🎯 Сегодня выбор особенно важен.',
          '🌟 Удача любит смелых.',
          '🔮 Перемены уже начались.',
          '🌄 Ты стоишь у нового рубежа.',
        ];
        const mysticalPredictions = [
          '👁 Око вулкана видит твою скрытую истину.',
          '🌑 Тень прошлого должна быть отпущена.',
          '🩸 Лава очищает старую судьбу.',
          '🌠 Сегодня реальность может треснуть.',
          '🕯 Тайный знак уже был дан.',
          '🧿 Смотри внимательнее: судьба говорит символами.',
          '🌋 Глубины пробуждаются ради тебя.',
          '⚖ Баланс нарушен — восстанови его.',
          '🌀 Старый цикл завершён.',
          '🔺 Вулкан избрал тебя свидетелем перемен.',
        ];
        const chaosPredictions = [
          '💀 Судьба больше не шепчет — она кричит.',
          '🌋 Извержение уже внутри тебя.',
          '⚠ Грядущие перемены необратимы.',
          '🔥 Мир вокруг изменится быстрее, чем ты ожидаешь.',
          '👹 Хаос приносит новые возможности.',
          '🌌 Реальность плавится под твоим выбором.',
          '🩸 Судьба требует решительности.',
          '⚡ Ты стал частью великого сдвига.',
          '🕳 Бездна тоже даёт ответы.',
          '🌋 Последний шаг определит всё.',
        ];

        function getPredictionPool(count) {
          if (count < 50) return calmPredictions;
          if (count < 150) return activePredictions;
          if (count < 300) return mysticalPredictions;
          return chaosPredictions;
        }
        function getRandomPrediction(count) {
          const pool = getPredictionPool(count);
          return pool[Math.floor(Math.random() * pool.length)];
        }

        // ----- счётчик -----
        let totalPredictions = parseInt(localStorage.getItem('totalPredictions') || '0', 10);
        const totalCountEl = document.getElementById('totalCount');
        if (totalCountEl) totalCountEl.innerText = totalPredictions;

        // ----- показ -----
        const frame = document.getElementById('frame');
        const predictionText = document.getElementById('predictionText');

        function renderPrediction(text, count) {
          if (typeof count === 'number') {
            totalPredictions = count;
            localStorage.setItem('totalPredictions', totalPredictions);
            if (totalCountEl) totalCountEl.innerText = totalPredictions;
          }
          frame.classList.remove('visible');
          frame.classList.remove('idle');
          void frame.offsetWidth;
          predictionText.innerText = text;
          frame.classList.add('visible');
        }

        // ----- звук -----
        function playSound() {
          try {
            const Ctx = window.AudioContext || window.webkitAudioContext;
            const ctx = new Ctx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain).connect(ctx.destination);
            osc.frequency.value = 120;
            gain.gain.value = 0.15;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.8);
            osc.stop(ctx.currentTime + 0.8);
            setTimeout(() => ctx.close(), 1000);
          } catch (e) {}
        }

        // ----- статус -----
        const statusEl = document.getElementById('status');
        function setStatus(text, cls = '') {
          if (!statusEl) return;
          statusEl.className = 'status ' + cls;
          statusEl.innerText = text;
        }

        // ----- PeerJS -----
        // Пульт = хост (показывает QR, ждёт подключений, шлёт предсказания)
        // Жерло = клиент (сканирует QR, подключается к Пульту, отображает предсказания)
        const hostId = `mof-oracle-${room}-host`;
        const myId = role === 'remote'
          ? hostId
          : `mof-oracle-${room}-d-${Math.random().toString(36).slice(2, 8)}`;
        const peer = new Peer(myId, { debug: 1 });

        const liveConns = new Set();
        const qrCorner = document.getElementById('qrCorner');
        const updateQrDim = () => {
          if (qrCorner) qrCorner.classList.toggle('dim', liveConns.size > 0);
        };

        peer.on('error', (err) => {
          console.warn('peer error', err);
          if (err.type === 'unavailable-id' && role === 'remote') {
            setStatus('id занят, перезапуск…', 'err');
            setTimeout(() => location.reload(), 4000);
          } else if (err.type === 'peer-unavailable' && role === 'display') {
            console.log('[oracle] пульт не в сети — жду…');
            setTimeout(connectToHost, 3000);
          } else if (role === 'remote') {
            setStatus('ошибка: ' + err.type, 'err');
          }
        });

        if (role === 'remote') {
          // === ПУЛЬТ: хост, кнопка, QR ===
          const qrRoomLabel = document.getElementById('qrRoom');
          const displayUrl = `${location.origin}${location.pathname}?mode=display&room=${encodeURIComponent(room)}`;
          if (qrRoomLabel) qrRoomLabel.innerText = room;

          if (!window.QRious) {
            console.error('[oracle] QRious не загрузился — проверь сеть/блокировщики.');
            if (qrCorner) qrCorner.style.display = 'none';
          } else {
            try {
              new QRious({
                element: document.getElementById('qrCanvas'),
                value: displayUrl,
                size: 340,
                foreground: '#1a0500',
                background: '#ffeecc',
                level: 'M',
              });
              console.log('[oracle] QR готов:', displayUrl);
            } catch (err) {
              console.error('[oracle] QR ошибка:', err);
            }
          }

          peer.on('open', () => {
            setStatus('жду жерло — отсканируй QR');
          });
          peer.on('connection', (conn) => {
            // QR прячем сразу — как только пришло соединение, не дожидаясь open
            liveConns.add(conn);
            updateQrDim();
            setStatus('жерло подключилось…', 'ok');
            document.getElementById('getPredictionBtn').disabled = false;
            conn.on('open', () => {
              setStatus('жерло подключено ✓', 'ok');
            });
            const cleanup = () => {
              if (!liveConns.has(conn)) return;
              liveConns.delete(conn);
              updateQrDim();
              if (liveConns.size === 0) {
                setStatus('жерло отключилось, жду…', 'err');
                document.getElementById('getPredictionBtn').disabled = true;
              }
            };
            conn.on('close', cleanup);
            conn.on('error', cleanup);
          });

          document.getElementById('getPredictionBtn').addEventListener('click', () => {
            const openConns = Array.from(liveConns).filter((c) => c.open);
            if (openConns.length === 0) {
              setStatus('жерло ещё не готово…', 'err');
              return;
            }
            const nextCount = totalPredictions + 1;
            const text = getRandomPrediction(nextCount);
            totalPredictions = nextCount;
            localStorage.setItem('totalPredictions', totalPredictions);
            totalCountEl.innerText = totalPredictions;
            openConns.forEach((conn) =>
              conn.send({ type: 'prediction', text, count: totalPredictions }),
            );
            playSound();
          });
        }

        function connectToHost() {
          console.log('[oracle] подключаюсь к пульту…');
          const conn = peer.connect(hostId, { reliable: true });
          conn.on('open', () => {
            console.log('[oracle] подключено к пульту ✓');
          });
          conn.on('close', () => {
            console.log('[oracle] связь потеряна, переподключаюсь…');
            setTimeout(connectToHost, 2000);
          });
          conn.on('error', (e) => {
            console.warn('[oracle] ошибка связи', e);
          });
          conn.on('data', (data) => {
            if (data && data.type === 'prediction') {
              playSound();
              renderPrediction(data.text, data.count);
            }
          });
        }

        if (role === 'display') {
          peer.on('open', () => {
            connectToHost();
          });
        }
      }

      // ============ ВИДЕО-ФОН ============
      (function setupLavaVideo() {
        const v = document.querySelector('.lava-bg');
        if (!v) return;
        v.addEventListener('loadeddata', () => console.log('[oracle] видео: данные загружены'));
        v.addEventListener('canplay', () => console.log('[oracle] видео: готово к проигрыванию'));
        v.addEventListener('playing', () => console.log('[oracle] видео: играет'));
        v.addEventListener('error', () => {
          const e = v.error;
          console.error('[oracle] видео ошибка:', e ? `code=${e.code} ${e.message}` : '(unknown)');
        });
        v.addEventListener('stalled', () => console.warn('[oracle] видео: stalled'));
        const tryPlay = () =>
          v.play().then(
            () => {},
            (err) => console.warn('[oracle] play() отклонён:', err && err.message),
          );
        tryPlay();
        // если браузер блокирует autoplay — стартуем по первому клику/тапу
        const wake = () => tryPlay();
        document.addEventListener('click', wake, { once: true });
        document.addEventListener('touchstart', wake, { once: true, passive: true });
      })();

      // ============ SERVICE WORKER ============
      // Когда обновляется код, новый SW делает skipWaiting + clients.claim,
      // и эта страница сама перезагружается, чтобы подхватить свежую версию.
      if ('serviceWorker' in navigator) {
        const hadController = !!navigator.serviceWorker.controller;
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          if (!hadController) return; // первая регистрация — не перезагружаем
          refreshing = true;
          console.log('[oracle] новая версия SW, перезагружаюсь');
          location.reload();
        });
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('service-worker.js')
            .then((reg) => reg.update())
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
