<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Магма Оракула</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: 'Courier New', 'Georgia', monospace;
      }
      video {
        position: fixed;
        top: 0;
        left: 0;
        min-width: 100%;
        min-height: 100%;
        object-fit: cover;
        z-index: -1;
      }
      .ui {
        position: relative;
        z-index: 1;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
        border-radius: 60px;
        margin: 40px;
        padding: 20px;
        text-align: center;
        color: #ffdd99;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
      }
      h1 {
        font-size: 2.5rem;
        margin: 0 0 20px 0;
        text-shadow: 0 0 10px #ff6600;
      }
      button {
        font-size: 2.2rem;
        padding: 20px 40px;
        background: #e35f21;
        border: none;
        border-radius: 100px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        margin: 20px;
        box-shadow: 0 6px 0 #722f0a;
        transition: 0.05s linear;
      }
      button:active {
        transform: translateY(3px);
        box-shadow: 0 3px 0 #722f0a;
      }
      .prediction {
        font-size: 1.6rem;
        background: #1a1a1acc;
        padding: 20px;
        border-radius: 50px;
        margin: 20px auto;
        max-width: 85%;
        border-left: 6px solid #ff8833;
      }
      .counter {
        font-size: 1.2rem;
        margin-top: 20px;
        background: #00000088;
        display: inline-block;
        padding: 8px 20px;
        border-radius: 40px;
      }
      footer {
        font-size: 0.8rem;
        margin-top: 15px;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <video autoplay muted loop playsinline id="lavaVideo">
      <!-- Укажите ПРАВИЛЬНЫЙ путь к скачанному видео. Например, lava.mp3? нужно mp4 -->
      <source src="lava.mp4" type="video/mp4" />
      Ваш браузер не поддерживает видео.
    </video>
    <div class="ui">
      <h1>🌋 ЖЕРЛО СУДЬБЫ 🌋</h1>
      <button id="getPredictionBtn">🔮 ПОЛУЧИТЬ ПРЕДСКАЗАНИЕ</button>
      <div id="predictionDisplay" class="prediction">Нажми на кнопку, открой будущее</div>
      <div class="counter">✨ Всего предсказаний: <span id="totalCount">0</span> ✨</div>
      <footer>Твой выбор — нажать. Судьба случайна, как извержение.</footer>
    </div>

    <script>
      let totalPredictions = 0;
      if (localStorage.getItem('totalPredictions')) {
        totalPredictions = parseInt(localStorage.getItem('totalPredictions')) || 0;
      }

      document.getElementById('totalCount').innerText = totalPredictions;

      let timeoutId = null;

      // ===== МАССИВЫ =====
      const calmPredictions = [
        '🌊 Судьба течёт спокойно — доверься времени.',
        '🌱 Сегодня рост начинается с малого шага.',
        '☀️ Светлый путь уже открыт перед тобой.',
        '🍃 Ветер перемен мягко коснётся твоей жизни.',
        '🕊 Мир внутри тебя станет главным ответом.',
        '🌸 Терпение принесёт неожиданный дар.',
        '💧 Даже капля способна изменить камень.',
        '🌙 Луна хранит для тебя тихую удачу.',
        '🌿 Новое начнётся без лишнего шума.',
        '✨ Судьба благосклонна к спокойным сердцам.',
      ];

      const activePredictions = [
        '🔥 Судьба советует рискнуть.',
        '⚡ Действуй сейчас — момент силы пришёл.',
        '🌋 Твоя энергия способна изменить ход событий.',
        '🌀 Решение близко, не бойся перемен.',
        '💥 Из искры родится великое.',
        '🚪 Откроется дверь, которую ты не замечал.',
        '🎯 Сегодня выбор особенно важен.',
        '🌟 Удача любит смелых.',
        '🔮 Перемены уже начались.',
        '🌄 Ты стоишь у нового рубежа.',
      ];

      const mysticalPredictions = [
        '👁 Око вулкана видит твою скрытую истину.',
        '🌑 Тень прошлого должна быть отпущена.',
        '🩸 Лава очищает старую судьбу.',
        '🌠 Сегодня реальность может треснуть.',
        '🕯 Тайный знак уже был дан.',
        '🧿 Смотри внимательнее: судьба говорит символами.',
        '🌋 Глубины пробуждаются ради тебя.',
        '⚖ Баланс нарушен — восстанови его.',
        '🌀 Старый цикл завершён.',
        '🔺 Вулкан избрал тебя свидетелем перемен.',
      ];

      const chaosPredictions = [
        '💀 Судьба больше не шепчет — она кричит.',
        '🌋 Извержение уже внутри тебя.',
        '⚠ Грядущие перемены необратимы.',
        '🔥 Мир вокруг изменится быстрее, чем ты ожидаешь.',
        '👹 Хаос приносит новые возможности.',
        '🌌 Реальность плавится под твоим выбором.',
        '🩸 Судьба требует решительности.',
        '⚡ Ты стал частью великого сдвига.',
        '🕳 Бездна тоже даёт ответы.',
        '🌋 Последний шаг определит всё.',
      ];

      // ===== ВЫБОР ПУЛА =====
      function getPredictionPool(count) {
        if (count < 50) return calmPredictions;
        if (count < 150) return activePredictions;
        if (count < 300) return mysticalPredictions;
        return chaosPredictions;
      }

      function getRandomPrediction() {
        const currentPool = getPredictionPool(totalPredictions);
        return currentPool[Math.floor(Math.random() * currentPool.length)];
      }

      // ===== ЗВУК =====
      function playSound() {
        try {
          let AudioContext = window.AudioContext || window.webkitAudioContext;
          let ctx = new AudioContext();
          let osc = ctx.createOscillator();
          let gain = ctx.createGain();

          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.frequency.value = 120;
          gain.gain.value = 0.15;

          osc.start();

          gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.8);

          osc.stop(ctx.currentTime + 0.8);

          setTimeout(() => ctx.close(), 1000);
        } catch (e) {
          console.log('звук не поддерживается');
        }
      }

      // ===== ИНТЕНСИВНОСТЬ =====
      function updateVolcanoIntensity() {
        const maxCount = 300;
        const intensity = Math.min(totalPredictions / maxCount, 1);

        const red = Math.floor(50 + intensity * 205);
        const blue = Math.floor(255 - intensity * 255);
        const green = Math.floor(80 - intensity * 50);

        document.body.style.background = `rgb(${red}, ${green}, ${blue})`;

        document.querySelector('.ui').style.boxShadow =
          `0 0 ${20 + intensity * 50}px rgba(${red},50,0,0.8)`;
      }

      // ===== ОСНОВНАЯ ФУНКЦИЯ =====
      function showPrediction() {
        totalPredictions++;
        localStorage.setItem('totalPredictions', totalPredictions);
        document.getElementById('totalCount').innerText = totalPredictions;

        playSound();
        updateVolcanoIntensity();

        const predText = getRandomPrediction();
        const predDiv = document.getElementById('predictionDisplay');

        predDiv.innerHTML = `🔮 ${predText} 🔮`;

        if (timeoutId) clearTimeout(timeoutId);

        timeoutId = setTimeout(() => {
          predDiv.innerHTML = 'Нажми на кнопку, открой будущее';
        }, 6000);
      }

      // ===== СОБЫТИЕ КНОПКИ =====
      document.getElementById('getPredictionBtn').addEventListener('click', showPrediction);

      // ===== ЗАПУСК =====
      updateVolcanoIntensity();
    </script>
  </body>
</html>
