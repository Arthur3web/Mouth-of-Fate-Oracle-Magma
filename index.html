<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a0a00" />
    <title>Жерло Судьбы</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="images/icon-192.svg" />
    <link rel="apple-touch-icon" href="images/icon-192.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <video class="lava-bg" autoplay muted loop playsinline preload="auto">
      <source src="images/lava.mp4" type="video/mp4" />
    </video>

    <!-- ЖЕРЛО -->
    <div class="frame idle visible" id="frame">
      <span id="predictionText">…жерло судьбы внимает тишине…</span>
    </div>

    <!-- ПУЛЬТ -->
    <div class="remote-panel">
      <h1>ОРАКУЛ</h1>
      <div class="status" id="status">Нет соединения — Оракул спит</div>
      <div class="remote-hint">
        Задайте волнующий Вас вопрос, <br />оракул подскажет на него ответ.
      </div>
      <button class="big" id="getPredictionBtn" disabled>
        ПОЛУЧИТЬ ПРЕДСКАЗАНИЕ
      </button>
      <div class="counter">
        Доверилось оракулу <span id="totalCount">0</span>
        <span id="totalNoun">человек</span>
      </div>
    </div>

    <!-- Сменить роль (видна в режимах display/remote) -->
    <button class="menu-btn" id="menuBtn">
      <img src="images/more-horizontal.svg" alt="menu" />
    </button>

    <div class="menu" id="menu">
      <div class="menu-title">Смена роли</div>
      <button class="menu-option" data-role="display" id="roleDisplayBtn">
        ЖЕРЛО
      </button>
      <button class="menu-option" data-role="remote" id="roleRemoteBtn">
        ОРАКУЛ
      </button>
      <button class="menu-clear" id="clearCacheBtn">очистить кэш</button>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
